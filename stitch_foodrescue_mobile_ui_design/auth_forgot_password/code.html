<body class="bg-background text-on-background min-h-screen flex flex-col font-body-lg">
<!-- TopAppBar -->
<header class="bg-white fixed top-0 w-full z-50 border-b-2 border-surface-variant flex justify-between items-center px-6 py-4 w-full flat no shadows">
<div class="flex items-center gap-4">
<button class="text-zinc-500 hover:opacity-80 transition-opacity active:scale-95 duration-150 flex items-center justify-center">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="text-xl font-black text-zinc-900 uppercase italic font-['Epilogue'] tracking-tight">FoodRescue</h1>
</div>
<div>
<!-- Suppressed avatar for transactional screen -->
</div>
</header>
<!-- Main Content Area - Transactional Screen (No Navbars) -->
<main class="flex-grow flex items-center justify-center px-container-margin pt-[80px] pb-section-padding">
<div class="w-full max-w-md bg-white rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.06)] p-8">
<!-- Header Section -->
<div class="text-center mb-8">
<div class="w-16 h-16 bg-surface-container rounded-full flex items-center justify-center mx-auto mb-6">
<span class="material-symbols-outlined text-secondary text-[32px]">lock_reset</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-background mb-2">Reset Password</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Enter the email associated with your account and we'll send you a link to reset your password.</p>
</div>
<!-- Form Section -->
<form class="space-y-stack-gap flex flex-col">
<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps text-on-surface uppercase" for="email">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-secondary text-[20px]">mail</span>
<input class="w-full pl-12 pr-4 py-3 rounded-xl border-2 border-surface-variant bg-surface-container-lowest text-on-background focus:border-primary-container focus:ring-0 transition-colors font-body-md text-body-md placeholder:text-secondary-fixed-dim" id="email" name="email" placeholder="hello@example.com" required="" type="email">
</div>
</div>
<div class="pt-4">
<button class="w-full bg-primary-container text-on-background font-title-sm text-title-sm py-4 rounded-xl hover:bg-primary-fixed transition-colors active:scale-95 duration-150 flex items-center justify-center gap-2" type="submit">
                        Send Reset Link
                        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</form>
<!-- Footer Links -->
<div class="mt-8 text-center">
<a class="font-body-md text-body-md text-secondary hover:text-on-background transition-colors inline-flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-[16px]">arrow_back</span>

</div>
